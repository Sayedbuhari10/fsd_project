services:
  frontend-service:
    build:
      context: .
      dockerfile: frontend-service/Dockerfile
    image: smart-energy/frontend-service:1.0.0
    ports:
      - "3000:3000"
    environment:
      API_PROXY_TARGET: http://gateway-service:8080
    depends_on:
      - gateway-service

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    image: smart-energy/auth-service:1.0.0
    ports:
      - "8081:8081"
    environment:
      MYSQL_HOST: host.docker.internal
      MYSQL_PORT: 3306
      MYSQL_DATABASE: smart_energy_demo
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ""

  dashboard-service:
    build:
      context: .
      dockerfile: dashboard-service/Dockerfile
    image: smart-energy/dashboard-service:1.0.0
    ports:
      - "8082:8082"

  consumption-service:
    build:
      context: .
      dockerfile: consumption-service/Dockerfile
    image: smart-energy/consumption-service:1.0.0
    ports:
      - "8083:8083"

  simulation-service:
    build:
      context: .
      dockerfile: simulation-service/Dockerfile
    image: smart-energy/simulation-service:1.0.0
    ports:
      - "8084:8084"

  realtime-service:
    build:
      context: .
      dockerfile: realtime-service/Dockerfile
    image: smart-energy/realtime-service:1.0.0
    ports:
      - "8085:8085"

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    image: smart-energy/gateway-service:1.0.0
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      DASHBOARD_SERVICE_URL: http://dashboard-service:8082
      CONSUMPTION_SERVICE_URL: http://consumption-service:8083
      SIMULATION_SERVICE_URL: http://simulation-service:8084
      REALTIME_SERVICE_URL: http://realtime-service:8085
    depends_on:
      - auth-service
      - dashboard-service
      - consumption-service
      - simulation-service
      - realtime-service
