apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: smart-energy-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: smart-energy/gateway-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8081
            - name: DASHBOARD_SERVICE_URL
              value: http://dashboard-service:8082
            - name: CONSUMPTION_SERVICE_URL
              value: http://consumption-service:8083
            - name: SIMULATION_SERVICE_URL
              value: http://simulation-service:8084
            - name: REALTIME_SERVICE_URL
              value: http://realtime-service:8085
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: smart-energy-demo
spec:
  selector:
    app: gateway-service
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
