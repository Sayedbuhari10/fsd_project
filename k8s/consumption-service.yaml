apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumption-service
  namespace: smart-energy-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumption-service
  template:
    metadata:
      labels:
        app: consumption-service
    spec:
      containers:
        - name: consumption-service
          image: smart-energy/consumption-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: consumption-service
  namespace: smart-energy-demo
spec:
  selector:
    app: consumption-service
  ports:
    - port: 8083
      targetPort: 8083

