apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-service
  namespace: smart-energy-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: realtime-service
  template:
    metadata:
      labels:
        app: realtime-service
    spec:
      containers:
        - name: realtime-service
          image: smart-energy/realtime-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-service
  namespace: smart-energy-demo
spec:
  selector:
    app: realtime-service
  ports:
    - port: 8085
      targetPort: 8085

