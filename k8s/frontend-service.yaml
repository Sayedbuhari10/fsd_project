apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
  namespace: smart-energy-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-service
  template:
    metadata:
      labels:
        app: frontend-service
    spec:
      containers:
        - name: frontend-service
          image: smart-energy/frontend-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: API_PROXY_TARGET
              value: http://gateway-service:8080
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: smart-energy-demo
spec:
  selector:
    app: frontend-service
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30082
  type: NodePort
