apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: smart-energy-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: smart-energy/auth-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: MYSQL_HOST
              value: host.docker.internal
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DATABASE
              value: smart_energy_demo
            - name: MYSQL_USERNAME
              value: root
            - name: MYSQL_PASSWORD
              value: ""
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: smart-energy-demo
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
