apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulation-service
  namespace: smart-energy-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simulation-service
  template:
    metadata:
      labels:
        app: simulation-service
    spec:
      containers:
        - name: simulation-service
          image: smart-energy/simulation-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: simulation-service
  namespace: smart-energy-demo
spec:
  selector:
    app: simulation-service
  ports:
    - port: 8084
      targetPort: 8084

