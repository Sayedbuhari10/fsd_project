apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: smart-energy-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
    spec:
      containers:
        - name: dashboard-service
          image: smart-energy/dashboard-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: smart-energy-demo
spec:
  selector:
    app: dashboard-service
  ports:
    - port: 8082
      targetPort: 8082

